name: Android CI/CD Pipeline

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:  # ম্যানুয়ালি রান করার অপশন

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout Code
      uses: actions/checkout@v4
      
    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        
    - name: Setup Android SDK
      uses: android-actions/setup-android@v3
      
    - name: Make Gradle Executable
      run: chmod +x ./gradlew
      
    - name: Build Debug APK
      run: ./gradlew assembleDebug
      
    - name: Upload Debug APK
      uses: actions/upload-artifact@v4
      with:
        name: debug-apk
        path: app/build/outputs/apk/debug/*.apk
        retention-days: 7
        
  release:
    runs-on: ubuntu-latest
    needs: build  # আগে build job শেষ হতে হবে
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    
    steps:
    - name: Checkout Code
      uses: actions/checkout@v4
      
    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        
    - name: Setup Android SDK
      uses: android-actions/setup-android@v3
      
    - name: Make Gradle Executable
      run: chmod +x ./gradlew
      
    - name: Decode Keystore
      run: |
        echo "${{ secrets.KEY_STORE }}" | base64 --decode > app/keystore.jks
        
    - name: Create release.properties
      run: |
        cat << EOF > release.properties
        storeFile=keystore.jks
        storePassword=${{ secrets.KEY_STORE_PASSWORD }}
        keyAlias=${{ secrets.KEY_ALIAS }}
        keyPassword=${{ secrets.KEY_PASSWORD }}
        EOF
        
    - name: Build Release APK
      run: ./gradlew assembleRelease
      
    - name: Upload Release APK
      uses: actions/upload-artifact@v4
      with:
        name: release-apk
        path: app/build/outputs/apk/release/*.apk
        retention-days: 30
        
    - name: Generate Release Notes
      run: |
        echo "## Build Information" > release_notes.md
        echo "- **Branch:** ${{ github.ref }}" >> release_notes.md
        echo "- **Commit:** ${{ github.sha }}" >> release_notes.md
        echo "- **Build Date:** $(date)" >> release_notes.md
        echo "" >> release_notes.md
        echo "### Changes:" >> release_notes.md
        echo "${{ github.event.head_commit.message }}" >> release_notes.md
        
    - name: Create GitHub Release
      uses: softprops/action-gh-release@v1
      with:
        tag_name: v1.0.${{ github.run_number }}
        name: Release v1.0.${{ github.run_number }}
        body_path: release_notes.md
        files: app/build/outputs/apk/release/*.apk
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
